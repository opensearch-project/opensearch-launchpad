name: CI

on:
  push:
  pull_request:

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install UV
        uses: astral-sh/setup-uv@v6
      - name: Run tests
        run: uv run pytest -q
      - name: Verify version consistency
        run: uv run python -c "import tomllib; p=tomllib.load(open('pyproject.toml','rb')); import opensearch_launchpad as pkg; assert p['project']['version'] == pkg.__version__, f'mismatch {p[\"project\"][\"version\"]} vs {pkg.__version__}'; print('version OK:', pkg.__version__)"
      - name: Build and verify artifacts
        run: |
          uv build
          for whl in dist/*.whl; do python -m zipfile -l "$whl"; done
      - name: Verify entry point import
        run: uv run python -c "import opensearch_launchpad.mcp_server as m; print(hasattr(m, 'main'))"

  test-macos:
    name: Test on macOS
    runs-on: macOS-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install UV
        uses: astral-sh/setup-uv@v6
      - name: Run tests
        run: uv run pytest -q
      - name: Build and verify artifacts
        run: |
          uv build
          for whl in dist/*.whl; do python -m zipfile -l "$whl"; done

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install UV
        uses: astral-sh/setup-uv@v6
      - name: Run tests
        shell: pwsh
        run: uv run pytest -q
      - name: Build and verify artifacts
        shell: pwsh
        run: uv build
